services:
  # API service (Express)
  api:
    image: calvicii/onloc-api:latest
    container_name: onloc-api
    environment:
      - DATABASE_URL=postgresql://onloc:onloc@db:5432/onloc?schema=public
      - PORT=4000
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://api:4000/api/health || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads:Z

  # UI service (React)
  ui:
    image: calvicii/onloc-ui:latest
    container_name: onloc-ui
    environment:
      - PORT=3000
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://ui:3000/health || exit 1"
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - api
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: onloc-db
    environment:
      POSTGRES_DB: onloc
      POSTGRES_USER: onloc
      POSTGRES_PASSWORD: onloc
    volumes:
      - ./data:/var/lib/postgresql/data:Z
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U onloc -d onloc
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "6144:80"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://caddy:80 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_healthy

configs:
  caddyfile:
    content: |
      :80 {
        # Proxy API, docs and WebSocket to backend
        reverse_proxy /api* api:4000
        reverse_proxy /ws* api:4000
        reverse_proxy /docs* api:4000
        reverse_proxy /uploads* api:4000

        # Everything else goes to the frontend
        reverse_proxy ui:3000
      }

networks:
  default:
    name: onloc-network
